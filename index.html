<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ola Financial | Nigerian Personal Finance Platform</title>
  <meta name="description" content="Ola Financial helps Nigerians track net worth, plan retirement, eliminate debt, and build financial freedom. Nigeria Tax Act 2025 compliant.">
  <meta name="theme-color" content="#0D1117">
  <link rel="canonical" href="https://olafinancial.org">
  <meta property="og:title" content="Ola Financial">
  <meta property="og:description" content="Track your net worth, crush debt, plan retirement — built for Nigeria.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://olafinancial.org">
  <meta property="og:site_name" content="Ola Financial">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@olafinancial">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ola Financial">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- App CSS -->
  <link rel="stylesheet" href="css/styles.css?v=20260710">
</head>
<body>

  <!-- App Root — WPApp.boot() populates this -->
  <div id="root">
    <!-- Loading splash shown until JS initializes -->
    <div id="app-splash" style="
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100vh; gap:1.5rem; background:var(--clr-bg);
    ">
      <div style="display:flex;align-items:center;gap:1rem">
        <div style="
          width:52px; height:52px; background:var(--clr-accent); border-radius:14px;
          display:flex; align-items:center; justify-content:center;
          font-size:1.8rem; box-shadow:0 0 32px var(--clr-accent-glow);
        ">⚡</div>
        <div>
          <div style="font-size:1.8rem;font-weight:800;color:var(--clr-text-1);letter-spacing:-0.02em">Ola Financial</div>
          <div style="font-size:0.78rem;color:var(--clr-text-3);letter-spacing:0.08em;text-transform:uppercase">Nigerian Financial Platform</div>
        </div>
      </div>
      <div class="spinner"></div>
      <div style="font-size:0.8rem;color:var(--clr-text-3)">Loading your financial dashboard…</div>
    </div>
  </div>

  <!-- Toast Container (used by WPToast in app.js) -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- =====================================================
       EXTERNAL CDN SCRIPTS
       ===================================================== -->
  <!-- Supabase JS SDK v2 -->
  <script src="js/lib/supabase.min.js"></script>
  <!-- Chart.js v4 -->
  <script src="js/lib/chart.umd.min.js"></script>

  <!-- =====================================================
       APP CORE  (load order matters)
       ===================================================== -->
  <script src="js/config.js?v=20260710"></script>
  <script src="js/utils.js?v=20260710"></script>
  <script src="js/supabase-client.js?v=20260710"></script>
  <script src="js/auth.js?v=20260710"></script>
  <script src="js/router.js?v=20260710"></script>
  <script src="js/charts.js?v=20260710"></script>

  <!-- =====================================================
       PAGE MODULES
       ===================================================== -->
  <script src="js/pages/onboarding.js?v=20260710"></script>
  <script src="js/pages/dashboard.js?v=20260710"></script>
  <script src="js/pages/income.js?v=20260710"></script>
  <script src="js/pages/expenses.js?v=20260710"></script>
  <script src="js/pages/balance-sheet.js?v=20260710"></script>
  <script src="js/pages/debt.js?v=20260710"></script>
  <script src="js/pages/cashflow.js?v=20260710"></script>
  <script src="js/pages/emergency-fund.js?v=20260710"></script>
  <script src="js/pages/goals.js?v=20260710"></script>
  <script src="js/pages/retirement.js?v=20260710"></script>
  <script src="js/pages/estate-planner.js?v=20260710"></script>
  <script src="js/pages/calculators.js?v=20260710"></script>
  <script src="js/pages/reports.js?v=20260710"></script>
  <script src="js/pages/settings.js?v=20260710"></script>

  <!-- =====================================================
       APP BOOTSTRAP (last — depends on everything above)
       ===================================================== -->
  <script src="js/app.js?v=20260710"></script>

  <!-- Boot -->
  <script>
    document.addEventListener('DOMContentLoaded', () => WPApp.boot());
  </script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('ServiceWorker registered with scope: ', reg.scope);
        }).catch(err => {
          console.error('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>

</body>
</html>
