<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pul Planning | Personal Finance Platform</title>
  <meta name="description" content="Pul Planning helps you track net worth, plan retirement, eliminate debt, and build financial freedom. Nigeria Tax Act 2025 compliant.">
  <meta name="theme-color" content="#0D1117">
  <link rel="canonical" href="https://pul.llc">
  <meta property="og:title" content="Pul Planning">
  <meta property="og:description" content="Track your net worth, crush debt, plan retirement — built for Nigeria.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pul.llc">
  <meta property="og:site_name" content="Pul Planning">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@pulplanning">
  <meta name="twitter:creator" content="@pulplanning">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/jpeg" href="pul_logo.jpeg">
  <link rel="apple-touch-icon" href="pul_logo.jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pul Planning">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- App CSS -->
  <link rel="stylesheet" href="css/styles.css?v=20260713_blurbs">
</head>
<body>

  <!-- App Root — WPApp.boot() populates this -->
  <div id="root">
    <!-- Loading splash shown until JS initializes -->
    <div id="app-splash" class="brand-splash" style="
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100vh; gap:1.5rem; background:var(--clr-bg);
    ">
      <div style="display:flex;align-items:center;gap:1rem">
        <img class="brand-logo" src="pul_logo.jpeg" alt="Pul" width="72" height="64" />
        <div>
          <div style="font-size:1.8rem;font-weight:800;color:var(--clr-text-1);letter-spacing:-0.02em">Pul Planning</div>
          <div style="font-size:0.78rem;color:var(--clr-text-3);letter-spacing:0.08em;text-transform:uppercase">Personal Finance Platform</div>
        </div>
      </div>
      <div class="spinner"></div>
      <div style="font-size:0.8rem;color:var(--clr-text-3)">Loading your financial dashboard…</div>
    </div>
  </div>

  <!-- Toast Container (used by WPToast in app.js) -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- =====================================================
       EXTERNAL CDN SCRIPTS
       ===================================================== -->
  <!-- Supabase JS SDK v2 -->
  <script src="js/lib/supabase.min.js"></script>
  <!-- Chart.js v4 -->
  <script src="js/lib/chart.umd.min.js"></script>
  <!-- html2canvas — Reports share/PNG export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>


  <!-- =====================================================
       APP CORE  (load order matters)
       ===================================================== -->
  <script src="js/config.js?v=20260716_path"></script>
  <script src="js/utils.js?v=20260716_bs50"></script>
  <script src="js/supabase-client.js?v=20260712"></script>
  <script src="js/auth.js?v=20260713_fix_logout"></script>
  <script src="js/router.js?v=20260713_fix_logout"></script>
  <script src="js/charts.js?v=20260712"></script>
  <!-- Insights & Sponsor modules (must load before page modules) -->
  <script src="js/lib/insights.js?v=20260712"></script>
  <script src="js/lib/sponsor.js?v=20260712"></script>

  <!-- =====================================================
       PAGE MODULES
       ===================================================== -->
  <script src="js/pages/onboarding.js?v=20260716_path"></script>
  <script src="js/pages/dashboard.js?v=20260713_guide"></script>
  <script src="js/pages/income.js?v=20260716_path"></script>
  <script src="js/pages/expenses.js?v=20260716_budget46"></script>
  <script src="js/pages/budget.js?v=20260716_budget46"></script>
  <script src="js/pages/balance-sheet.js?v=20260716_bs50"></script>
  <script src="js/pages/assets.js?v=20260716_mtm"></script>
  <script src="js/pages/liabilities.js?v=20260716_bs50"></script>
  <script src="js/pages/debt.js?v=20260716_bs50"></script>
  <script src="js/pages/cashflow.js?v=20260716_path"></script>
  <script src="js/pages/emergency-fund.js?v=20260711"></script>
  <script src="js/pages/goals.js?v=20260713_social"></script>
  <script src="js/pages/retirement.js?v=20260716_mtm"></script>
  <script src="js/pages/estate-planner.js?v=20260711"></script>
  <script src="js/pages/insurance.js?v=20260716_path"></script>
  <script src="js/pages/investment-quiz.js?v=20260713"></script>
  <script src="js/pages/salary-calculator.js?v=20260713"></script>
  <script src="js/pages/calculators.js?v=20260711"></script>
  <script src="js/pages/reports.js?v=20260716_bs50"></script>
  <script src="js/pages/settings.js?v=20260716_path"></script>
  
  <!-- =====================================================
       APP BOOTSTRAP (last — depends on everything above)
       ===================================================== -->
  <script src="js/app.js?v=20260716_path"></script>

  <!-- Cache control: purge on leave/sign-out; auto-update SW without hard refresh -->
  <script src="js/cache-control.js?v=20260715_offline"></script>

  <!-- Boot -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof WPCacheControl !== 'undefined') WPCacheControl.init();
      WPApp.boot();
    });
  </script>

</body>
</html>
