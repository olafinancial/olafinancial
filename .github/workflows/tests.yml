# ─────────────────────────────────────────────────────────────────────────────
# Ola Financial — Automated Test Pipeline
# Runs on every push to main and on all pull requests.
# Jobs: unit tests (Jest + coverage), then E2E tests (Playwright, 4 browsers).
# ─────────────────────────────────────────────────────────────────────────────
name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit tests ───────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/

  # ── 2. E2E tests (Playwright) ───────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit           # Only run E2E if unit tests pass
    env:
      CI: true
      BASE_URL: http://localhost:3000
      TEST_EMAIL:    ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # Prefer publishable key secret if set; fall back to anon key name
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify required secrets
        run: |
          missing=0
          for s in TEST_EMAIL TEST_PASSWORD; do
            if [ -z "${!s}" ]; then
              echo "::error::Missing secret: $s (Settings → Secrets and variables → Actions)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "Secrets present (values redacted). TEST_EMAIL length=${#TEST_EMAIL}"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Write .env for test server
        run: |
          # Match server/.env.example key names used by Node + @supabase/server
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}"
            echo "PORT=3000"
            echo "NODE_ENV=development"
            echo "TEST_EMAIL=${TEST_EMAIL}"
            echo "TEST_PASSWORD=${TEST_PASSWORD}"
          } > .env
          # Also write .env.test for Playwright dotenv load
          cp .env .env.test

      - name: Start dev server in background
        run: |
          npm run dev &
          # Wait until the server is accepting connections (max 60s)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Dev server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Dev server did not become ready on :3000"
          exit 1

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright test videos/screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: test-results/
