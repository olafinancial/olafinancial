# ─────────────────────────────────────────────────────────────────────────────
# Ola Financial — Automated Test Pipeline
# Runs on every push to main and on all pull requests.
# Jobs: unit tests (Jest + coverage), then E2E tests (Playwright, 4 browsers).
# ─────────────────────────────────────────────────────────────────────────────
name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit tests ───────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/

  # ── 2. E2E tests (Playwright) ───────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit           # Only run E2E if unit tests pass
    env:
      BASE_URL: http://localhost:3000
      TEST_EMAIL:    ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Write .env for test server
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Start dev server in background
        run: |
          npm run dev &
          # Wait until the server is accepting connections (max 30s)
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null && break || sleep 1
          done
          echo "Dev server ready"

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright test videos/screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: test-results/
