# supabase/config.toml
# Supabase local development configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://pul.llc"
additional_redirect_urls = [
  "https://pul.llc",
  "https://pul.llc/**",
  "https://www.pul.llc",
  "https://www.pul.llc/**",
  "https://olafinancial.org",
  "https://olafinancial.org/**",
  "https://www.olafinancial.org",
  "https://www.olafinancial.org/**",
  "http://127.0.0.1:3000",
  "http://localhost:3000"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false    # Set true in production

[auth.sms]
enable_signup = false

# ── EDGE FUNCTIONS ────────────────────────────────────────────
# "profile" and "snapshot" use auth: "user" — JWT is verified
# by @supabase/server via SUPABASE_JWKS_URL, so verify_jwt can
# be left at its default (true).

[functions.profile]
verify_jwt = true

[functions.snapshot]
verify_jwt = true

# "admin-users" uses auth: "secret" (service role key),
# so the function itself doesn't need Supabase to verify the JWT.
# withSupabase validates the secret key instead.

[functions.admin-users]
verify_jwt = false
